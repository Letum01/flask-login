<h2>Items</h2>

<a href="/logout">Logout</a>

<form method="post" action="/add">
    <input name="name">
    <button>Add</button>
</form>

<hr>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Delete</th>
</tr>

{% for i in data %}

<tr>
    <td>{{i[0]}}</td>
    <td>{{i[1]}}</td>
    <td>
        <a href="/delete/{{i[0]}}">
            Delete
        </a>
    </td>
</tr>

{% endfor %}

</table>
